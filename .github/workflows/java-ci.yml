name: Java CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/java/**'
      - 'examples/java-dgs-minimal/**'
      - 'examples/java-spring-minimal/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/java/**'
      - 'examples/java-dgs-minimal/**'
      - 'examples/java-spring-minimal/**'
      - '.github/workflows/java-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      MAVEN_REPO_LOCAL: ${{ github.workspace }}/.m2-ci
    strategy:
      matrix:
        java-version: ['21']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Restore dependencies
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml dependency:go-offline

      - name: Check formatting
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml spotless:check

      - name: Build and install reactor artifacts
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml -DskipTests install

      - name: Test
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml test

      - name: Verify release packaging
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml -P release -DskipTests -Dgpg.skip=true verify

      - name: Generate coverage report
        run: mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f src/java/pom.xml jacoco:report

      - name: Smoke build Java examples
        run: |
          mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f examples/java-spring-minimal/pom.xml -DskipTests package
          mvn -B -ntp -Dmaven.repo.local="${{ env.MAVEN_REPO_LOCAL }}" -f examples/java-dgs-minimal/pom.xml -DskipTests package

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: 'src/java/**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false
