name: Java CI

on:
  push:
    branches: [main, develop]
    paths: ['src/java/**']
  pull_request:
    branches: [main]
    paths: ['src/java/**']

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn -f src/java/pom.xml clean verify
