name: Java CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/java/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/java/**'
      - '.github/workflows/java-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Restore dependencies
        run: mvn -B -ntp -f src/java/pom.xml dependency:go-offline

      - name: Check formatting
        run: mvn -B -ntp -f src/java/pom.xml spotless:check

      - name: Build
        run: mvn -B -ntp -f src/java/pom.xml -DskipTests package

      - name: Test
        run: mvn -B -ntp -f src/java/pom.xml test

      - name: Generate coverage report
        run: mvn -B -ntp -f src/java/pom.xml jacoco:report

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: 'src/java/**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false
