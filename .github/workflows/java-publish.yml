name: Publish Java to Maven Central

on:
  push:
    tags: ['java-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/java-v}"
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $TAG"

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build
        run: mvn -B -ntp -f src/java/pom.xml -Drevision=${{ steps.version.outputs.VERSION }} -DskipTests install

      - name: Test
        run: mvn -B -ntp -f src/java/pom.xml -Drevision=${{ steps.version.outputs.VERSION }} test

      - name: Deploy
        run: mvn -B -ntp -f src/java/pom.xml -P release -DskipTests -Drevision=${{ steps.version.outputs.VERSION }} deploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == *-* ]]; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Maven Central prerelease for graphql-mcp-java ${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Maven Central release for graphql-mcp-java ${GITHUB_REF_NAME}" \
              --latest=false
          fi
