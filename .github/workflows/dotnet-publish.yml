name: Publish .NET to NuGet

on:
  push:
    tags: ['dotnet-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/dotnet/GraphQL.MCP.sln

      - name: Build
        run: dotnet build src/dotnet/GraphQL.MCP.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/dotnet/GraphQL.MCP.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/dotnet/GraphQL.MCP.sln -c Release --no-build -o ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
