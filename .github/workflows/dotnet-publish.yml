name: Publish .NET to NuGet

on:
  push:
    tags: ['dotnet-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/dotnet-v}"
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $TAG"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/dotnet/GraphQL.MCP.sln

      - name: Build
        run: dotnet build src/dotnet/GraphQL.MCP.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test src/dotnet/GraphQL.MCP.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/dotnet/GraphQL.MCP.sln -c Release --no-build -o ./nupkgs -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == *-* ]]; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "NuGet prerelease for GraphQL.MCP ${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "NuGet release for GraphQL.MCP ${GITHUB_REF_NAME}"
          fi
